<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Responsive</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .navbar {
            background-color: #333;
            overflow: hidden;
        }
        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }
        .navbar a:hover {
            background-color: #575757;
        }
        .icon {
            display: none; /* Cacher l'icône par défaut */
        }
        @media screen and (max-width: 600px) {
            .navbar a { display: none; } /* Cacher les liens */
            .navbar a.icon {
                float: right;
                display: block; /* Afficher l'icône */
            }
            .navbar.responsive { position: relative; }
            .navbar.responsive a {
                display: block; /* Afficher les liens lorsqu'en responsive */
                float: none;
            }
        }
    </style>
</head>
<body>

<div class="navbar" id="navbar">
    <a href="#home">Accueil</a>
    <a href="#services">Services</a>
    <a href="#about">À propos</a>
    <a href="#contact">Contact</a>
    <a href="javascript:void(0);" class="icon" onclick="toggleMenu()">
        &#9776; <!-- Icône hamburger -->
    </a>
</div>
<p>loremdnndnndnsnsnsnsjjsjsjjsjsjjjj
sjsjjsjsjsjsjsjjsjssjjsjjsjjjjjj</p>

<script>
    function toggleMenu() {
        var navbar = document.getElementById("navbar");
        navbar.classList.toggle("responsive");
    }
</script>

</body>
</html>
